name: Deploy Docs

# Builds the Fumadocs docs app (documentation/) as a static export and publishes
# it to GitHub Pages. Modeled on open-agent-toolkit's deploy-docs.yml, adapted
# for this repo's nested-standalone shape (the docs app has its own lockfile and
# is built with `cd documentation && pnpm build`, not a root workspace script).
#
# Prerequisite (one-time, operator): enable GitHub Pages with
# Settings -> Pages -> Source: "GitHub Actions".

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'documentation/**'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy docs to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: documentation/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: documentation
        run: pnpm install --frozen-lockfile

      - name: Build docs (static export -> documentation/out)
        working-directory: documentation
        run: pnpm build
        env:
          # GitHub Pages project site serves under https://<owner>.github.io/skills/.
          # If this repo later uses a custom domain at the apex, drop this so the
          # site builds at the root path instead.
          NEXT_PUBLIC_BASE_PATH: /skills

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: documentation/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
