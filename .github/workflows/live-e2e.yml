name: Live Provider E2E

# Manual-dispatch-only gate for tests/consensus/provider-cli/e2e/submit-live.e2e.test.ts
# — the one test that exercises a real provider CLI (claude/codex/cursor)
# instead of the fixture stubs the rest of the suite uses. It spends real
# provider API quota and requires an authenticated provider CLI on the
# runner, so this workflow is intentionally opt-in: manual-dispatch only,
# never wired to `pull_request`/`push`/tag triggers. See RELEASING.md and
# `pnpm run test:live-e2e` for the local equivalent.
#
# Required secrets (reference only — this workflow does not create them):
# configure whichever secret matches the selected `provider` input's CLI
# auth mechanism as a repository or environment secret before dispatching.
# Illustrative names, confirm against the installed provider CLI's own docs:
#   - ANTHROPIC_API_KEY — Claude Code CLI (`provider: claude`)
#   - OPENAI_API_KEY    — Codex CLI (`provider: codex`, the default)
#   - CURSOR_API_KEY    — Cursor CLI (`provider: cursor`)
# Provisioning/installing the provider CLI binaries themselves on the runner
# is also an operator responsibility this workflow does not perform. Without
# a usable provider, the live test's gating helper fails loudly (not a
# silent skip) so a misconfigured run is visible in the job logs.

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider CLI to exercise (claude, codex, or cursor)"
        type: choice
        options:
          - codex
          - claude
          - cursor
        default: codex

permissions:
  contents: read

jobs:
  live-e2e:
    runs-on: ubuntu-latest
    env:
      GIT_HOOKS: "0" # skip git-hook setup in CI
      CONSENSUS_LIVE_SUBMIT_E2E: "1"
      CONSENSUS_LIVE_SUBMIT_PROVIDER: ${{ inputs.provider }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Live provider submit E2E
        run: pnpm run test:live-e2e
