name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Rapid successive pushes/PR updates should cancel the stale six-job matrix
# instead of queueing duplicates.
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GIT_HOOKS: "0" # skip git-hook setup in CI
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture generated output paths
        run: node scripts/build-generated.mjs --list-outputs > "$RUNNER_TEMP/generated-output-paths.txt"
      - run: pnpm run build
      - name: Verify generated outputs are committed
        run: |
          generated_outputs=()
          while IFS= read -r file; do
            generated_outputs+=("$file")
          done < "$RUNNER_TEMP/generated-output-paths.txt"
          git diff --exit-code -- "${generated_outputs[@]}"
      - run: pnpm run type-check
      - run: pnpm run build:check
      - run: pnpm run test
      - run: pnpm run validate
      - run: pnpm run smoke

  skill-versions:
    # Require a version bump for any skill whose directory changed in the PR.
    # Needs full history (fetch-depth: 0) to diff against the PR base.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate changed skill version bumps
        run: node scripts/validate-skill-versions.mjs --base-ref "${{ github.event.pull_request.base.sha }}"

  internal-flags:
    # Block merge if any .agents/skills/**/SKILL.md is missing
    # metadata.internal: true — the flag that hides OAT tooling skills from
    # `npx skills` discovery. Modeled on the skill-versions gate; PR-scoped. The
    # detector scans the synced skills tree, so no base diff / full history is
    # needed.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate .agents/skills internal flags
        run: pnpm run validate:internal-flags

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint PR commits (Conventional Commits)
        run: >-
          pnpm exec commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose

  lint:
    # Lint/format only the files changed by the PR. The repo is being formatted
    # incrementally, so a whole-repo check would fail on the un-migrated backlog.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      GIT_HOOKS: "0"
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: oxlint (changed JS)
        run: |
          exclude='^(node_modules|\.oat|\.agents)/'
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.mjs' '*.js' | grep -vE "$exclude" | grep -vxF -f <(node scripts/build-generated.mjs --list-outputs) || true)
          if [ ${#files[@]} -eq 0 ]; then echo "no JS changed"; exit 0; fi
          printf 'linting:\n%s\n' "${files[*]}"
          pnpm exec oxlint "${files[@]}"
      - name: oxfmt --check (changed files)
        run: |
          exclude='^(node_modules|\.oat|\.agents)/|\.(claude|cursor)/rules/|(^|/)(AGENTS|CLAUDE)\.md$'
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.mjs' '*.js' '*.json' '*.md' | grep -vE "$exclude" | grep -vxF -f <(node scripts/build-generated.mjs --list-outputs) || true)
          if [ ${#files[@]} -eq 0 ]; then echo "no formattable files changed"; exit 0; fi
          printf 'checking format:\n%s\n' "${files[*]}"
          pnpm exec oxfmt --check "${files[@]}"
