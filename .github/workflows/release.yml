name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture generated output paths
        run: node scripts/build-generated.mjs --list-outputs > "$RUNNER_TEMP/generated-output-paths.txt"
      - run: pnpm run build
      - name: Verify generated outputs are committed
        run: |
          generated_outputs=()
          while IFS= read -r file; do
            generated_outputs+=("$file")
          done < "$RUNNER_TEMP/generated-output-paths.txt"
          git diff --exit-code -- "${generated_outputs[@]}"
      - run: pnpm run type-check
      - run: pnpm run build:check
      - run: pnpm run test
      - run: pnpm run validate
      - run: pnpm run smoke
      - run: node scripts/bump-version.mjs --check-tag "$GITHUB_REF_NAME"
