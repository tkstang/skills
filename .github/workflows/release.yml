name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture generated output paths
        run: node scripts/build-generated.mjs --list-outputs > "$RUNNER_TEMP/generated-output-paths.txt"
      - run: pnpm run build
      - name: Verify generated outputs are committed
        run: |
          generated_outputs=()
          while IFS= read -r file; do
            generated_outputs+=("$file")
          done < "$RUNNER_TEMP/generated-output-paths.txt"
          git diff --exit-code -- "${generated_outputs[@]}"
      - run: pnpm run type-check
      - run: pnpm run build:check
      - run: pnpm run test
      - run: pnpm run validate
      - run: pnpm run smoke
      - run: node scripts/bump-version.mjs --check-tag "$GITHUB_REF_NAME"
