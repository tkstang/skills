[features]
multi_agent = true

[agents.oat-codebase-mapper]
description = "Explores codebase and writes structured analysis documents. Spawned by oat-repo-knowledge-index with a focus area (tech, arch, quality, concerns). Writes documents directly to reduce orchestrator context load."
config_file = "agents/oat-codebase-mapper.toml"

[agents.oat-phase-implementer]
description = "Implements a single plan phase end-to-end — reads artifacts once, executes tasks sequentially, commits per task, self-reviews, and returns a structured summary. Dispatched by oat-project-implement."
config_file = "agents/oat-phase-implementer.toml"

[agents.oat-reviewer]
description = "Unified reviewer for OAT projects - mode-aware verification of requirements/design alignment and code quality. Writes a review artifact to disk by default, or returns structured findings in-memory when dispatched in structured-output mode."
config_file = "agents/oat-reviewer.toml"

[agents.oat-phase-implementer-high]
description = "OAT phase implementer pinned to high reasoning effort for broad, subtle, or higher-risk implementation, fix, or review phases."
config_file = "agents/oat-phase-implementer-high.toml"

[agents.oat-phase-implementer-low]
description = "OAT phase implementer pinned to low reasoning effort for narrow mechanical implementation, fix, or review phases."
config_file = "agents/oat-phase-implementer-low.toml"

[agents.oat-phase-implementer-medium]
description = "OAT phase implementer pinned to medium reasoning effort for normal multi-file implementation, fix, or review phases."
config_file = "agents/oat-phase-implementer-medium.toml"

[agents.oat-phase-implementer-xhigh]
description = "OAT phase implementer pinned to xhigh reasoning effort for the highest configured Codex dispatch policy cap."
config_file = "agents/oat-phase-implementer-xhigh.toml"

[agents.oat-reviewer-high]
description = "OAT reviewer pinned to high reasoning effort for broad, subtle, or higher-risk implementation, fix, or review phases."
config_file = "agents/oat-reviewer-high.toml"

[agents.oat-reviewer-low]
description = "OAT reviewer pinned to low reasoning effort for narrow mechanical implementation, fix, or review phases."
config_file = "agents/oat-reviewer-low.toml"

[agents.oat-reviewer-medium]
description = "OAT reviewer pinned to medium reasoning effort for normal multi-file implementation, fix, or review phases."
config_file = "agents/oat-reviewer-medium.toml"

[agents.oat-reviewer-xhigh]
description = "OAT reviewer pinned to xhigh reasoning effort for the highest configured Codex dispatch policy cap."
config_file = "agents/oat-reviewer-xhigh.toml"

[agents.skeptical-evaluator]
description = "Adversarial claim evaluator — receives a context package and gathers evidence to disprove then support a claim. Returns structured findings with citations."
config_file = "agents/skeptical-evaluator.toml"
