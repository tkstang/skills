[features]
multi_agent = true

[agents]
max_depth = 3

[agents.oat-codebase-mapper]
description = "Explores codebase and writes structured analysis documents. Spawned by oat-repo-knowledge-index with a focus area (tech, arch, quality, concerns). Writes documents directly to reduce orchestrator context load."
config_file = "agents/oat-codebase-mapper.toml"

[agents.oat-phase-implementer]
description = "Implements one plan phase end-to-end, commits each task separately, self-checks between tasks, and handles bounded review fixes when resumed by oat-project-implement."
config_file = "agents/oat-phase-implementer.toml"

[agents.oat-reviewer]
description = "Unified reviewer for OAT projects - mode-aware verification of requirements/design alignment and code quality. Writes a review artifact to disk by default, or returns structured findings in-memory when dispatched in structured-output mode."
config_file = "agents/oat-reviewer.toml"

[agents.skeptical-evaluator]
description = "Adversarial claim evaluator — receives a context package and gathers evidence to disprove then support a claim. Returns structured findings with citations."
config_file = "agents/skeptical-evaluator.toml"

