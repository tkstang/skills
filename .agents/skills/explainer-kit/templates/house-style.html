<!doctype html>
<!--
  Neutral production shell. Worked content: ../examples/
  TEMPLATE CONTRACT: THEME_CSS, TITLE, DESCRIPTION, EYEBROW, NAVIGATION, CONTENT, FOOTER
  All replacement values are validated and escaped by the renderer.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <style>
      :root {
        --canvas: hsl(210 20% 98%);
        --panel: hsl(0 0% 100%);
        --panel-muted: hsl(210 16% 94%);
        --border: hsl(210 14% 82%);
        --ink: hsl(215 24% 16%);
        --muted: hsl(215 12% 38%);
        --accent: hsl(215 28% 32%);
        --success: hsl(145 45% 28%);
        --warning: hsl(38 70% 30%);
        --danger: hsl(0 55% 36%);
        --sans: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        --serif: ui-serif, Georgia, serif;
        --mono: ui-monospace, SFMono-Regular, Consolas, monospace;
        --radius: 0.65rem;
        {{THEME_CSS}}
      }
      * {
        box-sizing: border-box;
      }
      html {
        color-scheme: light dark;
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--canvas);
        color: var(--ink);
        font-family: var(--sans);
        line-height: 1.6;
      }
      a {
        color: var(--accent);
      }
      .wrap {
        display: grid;
        grid-template-columns: minmax(10rem, 14rem) minmax(0, 1fr);
        gap: 2rem;
        max-width: 74rem;
        margin: auto;
        padding: 2rem;
      }
      .toc {
        position: sticky;
        top: 2rem;
        align-self: start;
        max-height: calc(100dvh - 4rem);
        overflow-y: auto;
      }
      .toc-label,
      .eyebrow {
        color: var(--muted);
        font: 0.72rem/1.4 var(--mono);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .toc a {
        display: block;
        border-inline-start: 2px solid transparent;
        padding: 0.3rem 0.7rem;
        text-decoration: none;
      }
      .toc a.active {
        border-inline-start-color: var(--accent);
        font-weight: 650;
      }
      main {
        min-width: 0;
      }
      h1,
      h2,
      h3 {
        font-family: var(--serif);
        line-height: 1.2;
        text-wrap: balance;
      }
      h1 {
        font-size: clamp(2rem, 5vw, 3.4rem);
        margin-block: 0.5rem 1rem;
      }
      h2 {
        border-block-end: 1px solid var(--border);
        padding-block-end: 0.45rem;
        scroll-margin-top: 1rem;
      }
      section {
        margin-block: 2.5rem;
      }
      .cards,
      .lanes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 15rem), 1fr));
        gap: 1rem;
      }
      .card,
      .lane,
      .callout {
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        padding: 1rem;
        overflow-wrap: anywhere;
      }
      .callout {
        border-inline-start: 0.25rem solid var(--accent);
      }
      .table-scroll,
      pre {
        max-width: 100%;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-block-end: 1px solid var(--border);
        padding: 0.6rem;
        text-align: start;
      }
      code,
      pre {
        font-family: var(--mono);
      }
      footer {
        border-block-start: 1px solid var(--border);
        color: var(--muted);
        margin-block-start: 3rem;
        padding-block-start: 1rem;
      }
      @media (max-width: 46rem) {
        .wrap {
          grid-template-columns: 1fr;
          padding: 1rem;
        }
        .toc {
          position: sticky;
          top: 0;
          z-index: 2;
          display: flex;
          gap: 0.25rem;
          max-height: none;
          overflow-x: auto;
          background: var(--canvas);
          border-block-end: 1px solid var(--border);
          padding-block: 0.5rem;
        }
        .toc-label {
          display: none;
        }
        .toc a {
          flex: none;
          white-space: nowrap;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="toc" aria-label="Page sections">
        <div class="toc-label">{{EYEBROW}}</div>
        {{NAVIGATION}}
      </nav>
      <main>
        <header>
          <div class="eyebrow">{{EYEBROW}}</div>
          <h1>{{TITLE}}</h1>
          <p>{{DESCRIPTION}}</p>
        </header>
        {{CONTENT}}
        <footer>{{FOOTER}}</footer>
      </main>
    </div>
    <script>
      (() => {
        const links = [...document.querySelectorAll('.toc a[href^="#"]')];
        const targets = links
          .map((link) => document.querySelector(link.getAttribute('href')))
          .filter(Boolean);
        const observer = new IntersectionObserver(
          (entries) => {
            for (const entry of entries) {
              if (!entry.isIntersecting) continue;
              links.forEach((link) =>
                link.classList.toggle(
                  'active',
                  link.getAttribute('href') === `#${entry.target.id}`,
                ),
              );
            }
          },
          { rootMargin: '-15% 0px -70% 0px' },
        );
        targets.forEach((target) => observer.observe(target));
      })();
    </script>
  </body>
</html>
