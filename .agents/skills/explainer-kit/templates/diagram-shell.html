<!doctype html>
<!--
  Neutral production shell. Worked content: ../examples/
  TEMPLATE CONTRACT: THEME_CSS, TITLE, DESCRIPTION, DIAGRAM, LEGEND
  DIAGRAM contains validated inline SVG children; external diagram runtimes are not allowed.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <style>
      :root {
        --canvas: hsl(210 20% 98%);
        --panel: hsl(0 0% 100%);
        --border: hsl(210 14% 80%);
        --ink: hsl(215 24% 16%);
        --muted: hsl(215 12% 38%);
        --accent: hsl(215 28% 32%);
        --sans: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        --mono: ui-monospace, SFMono-Regular, Consolas, monospace;
        {{THEME_CSS}}
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        margin: 0;
        padding: clamp(1rem, 4vw, 3rem);
        background: var(--canvas);
        color: var(--ink);
        font-family: var(--sans);
      }
      main {
        max-width: 80rem;
        margin: auto;
      }
      header {
        max-width: 55rem;
        margin-block-end: 1.5rem;
      }
      h1 {
        margin-block: 0 0.4rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.1;
        text-wrap: balance;
      }
      header p,
      .diagram-hint {
        color: var(--muted);
      }
      .diagram-shell {
        position: relative;
        min-width: 0;
      }
      .diagram-hint {
        font: 0.75rem/1.4 var(--mono);
      }
      .diagram-viewport {
        position: relative;
        width: 100%;
        min-height: min(65vh, 40rem);
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--panel);
        cursor: grab;
      }
      .diagram-viewport.is-panning {
        cursor: grabbing;
        user-select: none;
      }
      .diagram-canvas {
        display: block;
        width: 100%;
        min-width: 42rem;
        height: auto;
        transform-origin: top left;
      }
      .diagram-canvas text {
        fill: var(--ink);
        font-family: var(--sans);
      }
      .diagram-canvas .node {
        fill: var(--panel);
        stroke: var(--accent);
      }
      .diagram-canvas .edge {
        fill: none;
        stroke: var(--muted);
      }
      .zoom-controls {
        position: absolute;
        z-index: 2;
        inset: 0.6rem 0.6rem auto auto;
        display: flex;
        gap: 0.25rem;
        padding: 0.25rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: var(--panel);
      }
      .zoom-controls button {
        min-width: 2rem;
        min-height: 2rem;
        border: 0;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-block-start: 1rem;
        color: var(--muted);
        font: 0.8rem/1.5 var(--mono);
      }
      @media (max-width: 45rem) {
        .diagram-canvas {
          min-width: 34rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1 id="diagram-title">{{TITLE}}</h1>
        <p id="diagram-description">{{DESCRIPTION}}</p>
      </header>
      <section class="diagram-shell" aria-labelledby="diagram-title">
        <p class="diagram-hint">
          Use the controls or Ctrl/Command + wheel to zoom; drag to pan.
        </p>
        <div class="zoom-controls" aria-label="Diagram zoom">
          <button type="button" data-zoom="in" aria-label="Zoom in">+</button>
          <button type="button" data-zoom="out" aria-label="Zoom out">−</button>
          <button type="button" data-zoom="reset" aria-label="Reset zoom">
            ↺
          </button>
        </div>
        <div class="diagram-viewport">
          <svg
            class="diagram-canvas"
            viewBox="0 0 1200 720"
            role="img"
            aria-labelledby="diagram-title diagram-description"
            xmlns="http://www.w3.org/2000/svg"
          >
            {{DIAGRAM}}
          </svg>
        </div>
        <div class="legend" aria-label="Diagram legend">{{LEGEND}}</div>
      </section>
    </main>
    <script>
      (() => {
        const viewport = document.querySelector('.diagram-viewport');
        const canvas = document.querySelector('.diagram-canvas');
        let zoom = 1;
        let dragging = false;
        let originX = 0;
        let originY = 0;
        let scrollX = 0;
        let scrollY = 0;
        const apply = () => {
          canvas.style.transform = `scale(${zoom})`;
        };
        document.querySelectorAll('[data-zoom]').forEach((button) => {
          button.addEventListener('click', () => {
            const action = button.dataset.zoom;
            zoom =
              action === 'reset'
                ? 1
                : Math.min(
                    3,
                    Math.max(0.5, zoom * (action === 'in' ? 1.2 : 0.8)),
                  );
            apply();
          });
        });
        viewport.addEventListener(
          'wheel',
          (event) => {
            if (!event.ctrlKey && !event.metaKey) return;
            event.preventDefault();
            zoom = Math.min(
              3,
              Math.max(0.5, zoom * (event.deltaY < 0 ? 1.1 : 0.9)),
            );
            apply();
          },
          { passive: false },
        );
        viewport.addEventListener('pointerdown', (event) => {
          dragging = true;
          originX = event.clientX;
          originY = event.clientY;
          scrollX = viewport.scrollLeft;
          scrollY = viewport.scrollTop;
          viewport.classList.add('is-panning');
          viewport.setPointerCapture(event.pointerId);
        });
        viewport.addEventListener('pointermove', (event) => {
          if (!dragging) return;
          viewport.scrollLeft = scrollX - (event.clientX - originX);
          viewport.scrollTop = scrollY - (event.clientY - originY);
        });
        viewport.addEventListener('pointerup', () => {
          dragging = false;
          viewport.classList.remove('is-panning');
        });
      })();
    </script>
  </body>
</html>
